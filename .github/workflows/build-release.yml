name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Validate sources
        shell: pwsh
        run: |
          python -m compileall src app.py scripts

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $version = (python -c "import sys; sys.path.insert(0, 'src'); from rompatcher.version import APP_VERSION; print(APP_VERSION)").Trim()
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          if ("v${{ steps.version.outputs.value }}" -ne "${{ github.ref_name }}") {
            throw "Le tag ${{ github.ref_name }} ne correspond pas a la version du code v${{ steps.version.outputs.value }}."
          }

      - name: Build application executable
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "RomPatcher" `
            --icon "assets\rompatcher.ico" `
            --paths "src" `
            "app.py"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe introuvable apres installation de Inno Setup."
          }
          & $iscc "/DAppVersion=${{ steps.version.outputs.value }}" "installer\RomPatcher.iss"

      - name: Prepare release asset
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $assetName = "RomPatcher-Setup-v$version-win64.exe"
          $assetPath = "dist\$assetName"
          if (-not (Test-Path $assetPath)) {
            throw "Installateur introuvable : $assetPath"
          }
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RomPatcher-Setup-v${{ steps.version.outputs.value }}-win64
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: RomPatcher ${{ steps.version.outputs.value }}
          files: ${{ steps.package.outputs.asset_path }}
          generate_release_notes: true
